<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">APBL 2026 대구 관광 빅데이터 해커톤</title>
  <desc id="desc">총 시상금 710만원, 전문가 멘토링, 최종 10개 팀 선발</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#eaf4ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f80ed"/>
      <stop offset="1" stop-color="#54b6ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1030" cy="90" r="220" fill="#d8efff" opacity="0.55"/>
  <circle cx="1020" cy="500" r="150" fill="#f0f8ff" opacity="0.9"/>
  <rect x="72" y="72" width="1056" height="486" rx="36" fill="#ffffff" stroke="#dce8f5" stroke-width="2"/>
  <rect x="112" y="112" width="132" height="42" rx="21" fill="#eef6ff"/>
  <text x="138" y="141" fill="#2f80ed" font-family="Arial, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="22" font-weight="800">APBL 2026</text>
  <text x="112" y="236" fill="#0b1f3a" font-family="Arial, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="58" font-weight="900">대구 관광 데이터를 활용한</text>
  <text x="112" y="314" fill="#12365a" font-family="Arial, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="70" font-weight="900">지역혁신 해커톤</text>
  <text x="112" y="386" fill="#54657a" font-family="Arial, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="30" font-weight="700">총 시상금 710만원 · 전문가 멘토링 · 최종 10개 팀 선발</text>
  <rect x="112" y="450" width="226" height="58" rx="16" fill="url(#accent)"/>
  <text x="154" y="487" fill="#ffffff" font-family="Arial, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="26" font-weight="900">지금 신청하기</text>
  <text x="376" y="486" fill="#2f80ed" font-family="Arial, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="26" font-weight="800">6월 30일 마감</text>
</svg>
